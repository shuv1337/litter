name: Shitter
options:
  bundleIdPrefix: io.latitudes.shitter
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true


settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OBJC_BRIDGING_HEADER: Sources/Shitter/Bridge/codex_bridge_objc.h
    OTHER_LDFLAGS: "$(inherited) -lc++ -lz"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: UH66Q8ZAYG

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.8.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Inject:
    url: https://github.com/krzysztofzablocki/Inject
    from: "1.5.2"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.1.0"

targets:
  ShitterRemote:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources/Shitter
        excludes:
          - "**/*.h"
    resources:
      - path: Sources/Shitter/Resources/ios_system/commandDictionary.plist
      - path: Sources/Shitter/Resources/ios_system/extraCommandsDictionary.plist
      - path: Sources/Shitter/Resources/Fonts
      - path: Sources/Shitter/Resources/Themes
      - path: Sources/Shitter/Resources/WidgetGuidelines
    dependencies:
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - package: Citadel
      - package: MarkdownUI
      - package: Inject
      - package: Highlightr
      - framework: Frameworks/ios_system/ios_system.xcframework
        embed: true
      - framework: Frameworks/ios_system/shell.xcframework
        embed: true
      - framework: Frameworks/ios_system/text.xcframework
        embed: true
      - framework: Frameworks/ios_system/files.xcframework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.latitudes.shitter.remote
        INFOPLIST_FILE: Sources/Shitter/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shitter/Bridge/codex_bridge_objc.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SHITTER_DISABLE_ON_DEVICE_CODEX"
      configs:
        Debug:
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz"
  Shitter:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: Sources/Shitter/Shitter.entitlements
      properties:
        aps-environment: production
        com.apple.security.application-groups:
          - group.io.latitudes.shitter
    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: true
    sources:
      - path: Sources/Shitter
        excludes:
          - "**/*.h"
      - path: Sources/ShitterLiveActivity/CodexTurnLiveActivity.swift
    resources:
      - path: Sources/Shitter/Resources/ios_system/commandDictionary.plist
      - path: Sources/Shitter/Resources/ios_system/extraCommandsDictionary.plist
      - path: Sources/Shitter/Resources/Fonts
      - path: Sources/Shitter/Resources/Themes
      - path: Sources/Shitter/Resources/WidgetGuidelines
    dependencies:
      - framework: Frameworks/codex_bridge.xcframework
        embed: false
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - package: Citadel
      - package: MarkdownUI
      - package: Inject
      - package: Highlightr
      - framework: Frameworks/ios_system/ios_system.xcframework
        embed: true
      - framework: Frameworks/ios_system/shell.xcframework
        embed: true
      - framework: Frameworks/ios_system/text.xcframework
        embed: true
      - framework: Frameworks/ios_system/files.xcframework
        embed: true
      - target: ShitterLiveActivity
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.latitudes.shitter
        INFOPLIST_FILE: Sources/Shitter/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shitter/Bridge/codex_bridge_objc.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIBackgroundModes: "fetch remote-notification"
      configs:
        Debug:
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz"
  ShitterLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: Sources/ShitterLiveActivity/ShitterLiveActivity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.latitudes.shitter
    sources:
      - path: Sources/ShitterLiveActivity
      - path: Sources/Shitter/Models/CodexTurnAttributes.swift
      - path: Sources/Shitter/Models/ShitterPalette.swift
      - path: Sources/Shitter/Views/LockScreenCardView.swift
    resources:
      - path: Sources/ShitterLiveActivity/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.latitudes.shitter.liveactivity
        INFOPLIST_FILE: Sources/ShitterLiveActivity/Info.plist
  CodexIOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/CodexIOSTests
    dependencies:
      - target: Shitter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false
  CodexIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/CodexIOSUITests
      - path: SnapshotHelper.swift
    dependencies:
      - target: Shitter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Shitter
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false

schemes:
  ShitterRemote:
    build:
      targets:
        ShitterRemote: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 0
  Shitter:
    build:
      targets:
        Shitter: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CodexIOSTests
        - CodexIOSUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 1
