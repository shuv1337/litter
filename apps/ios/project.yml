name: Shitter
options:
  bundleIdPrefix: io.latitudes.shitter
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true


settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OBJC_BRIDGING_HEADER: Sources/Shitter/Bridge/codex_bridge_objc.h
    OTHER_LDFLAGS: "$(inherited) -lc++ -lz"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.8.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Inject:
    url: https://github.com/krzysztofzablocki/Inject
    from: "1.5.2"

targets:
  ShitterRemote:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Shitter
        excludes:
          - "**/*.h"
    dependencies:
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - package: Citadel
      - package: MarkdownUI
      - package: Inject
      - framework: Frameworks/ios_system/ios_system.xcframework
        embed: true
      - framework: Frameworks/ios_system/shell.xcframework
        embed: true
      - framework: Frameworks/ios_system/text.xcframework
        embed: true
      - framework: Frameworks/ios_system/files.xcframework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.latitudes.shitter.remote
        INFOPLIST_FILE: Sources/Shitter/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shitter/Bridge/codex_bridge_objc.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SHITTER_DISABLE_ON_DEVICE_CODEX"
      configs:
        Debug:
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz"
  Shitter:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Shitter
        excludes:
          - "**/*.h"
    dependencies:
      - framework: Frameworks/codex_bridge.xcframework
        embed: false
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - package: Citadel
      - package: MarkdownUI
      - package: Inject
      - framework: Frameworks/ios_system/ios_system.xcframework
        embed: true
      - framework: Frameworks/ios_system/shell.xcframework
        embed: true
      - framework: Frameworks/ios_system/text.xcframework
        embed: true
      - framework: Frameworks/ios_system/files.xcframework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.latitudes.shitter
        INFOPLIST_FILE: Sources/Shitter/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shitter/Bridge/codex_bridge_objc.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz"

schemes:
  ShitterRemote:
    build:
      targets:
        ShitterRemote: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 0
  Shitter:
    build:
      targets:
        Shitter: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 1
